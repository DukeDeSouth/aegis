# SDS-обёртка: указывает Envoy читать generic secret из файла token.txt.
# Сам token.txt в репозитории не живёт — монтируется при развёртывании
# (docker-compose: AEGIS_BROKER_SECRET_FILE). Ядро этот файл не читает.
resources:
  - '@type': type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret
    name: broker_token
    generic_secret:
      secret:
        filename: /etc/broker/token.txt
