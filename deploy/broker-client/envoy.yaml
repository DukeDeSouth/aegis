# mTLS forwarder on core host — plain :8080 for sandbox, upstream remote broker :8443.
# BROKER_REMOTE_HOST is substituted by aegis-setup init (remote mode).

node:
  id: aegis-broker-client
  cluster: aegis

static_resources:
  listeners:
    - name: client_forwarder
      address:
        socket_address: { address: 0.0.0.0, port_value: 8080 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: broker_client
                route_config:
                  name: forward
                  virtual_hosts:
                    - name: forward_all
                      domains: ['*']
                      routes:
                        - match: { prefix: '/' }
                          route:
                            cluster: remote_broker
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: remote_broker
      type: STRICT_DNS
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: BROKER_REMOTE_HOST
          common_tls_context:
            tls_certificates:
              - certificate_chain: { filename: /etc/broker-client/tls/client.crt }
                private_key: { filename: /etc/broker-client/tls/client.key }
            validation_context:
              trusted_ca:
                filename: /etc/broker-client/tls/ca.crt
      load_assignment:
        cluster_name: remote_broker
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: BROKER_REMOTE_HOST, port_value: 8443 }
